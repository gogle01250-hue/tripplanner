<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripPlanner — 旅行プラン共有アプリ</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
        background: linear-gradient(135deg, #0ea5e9, #6366f1);
    }
    .card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        padding: 32px;
        margin: 16px;
    }
    h1 {
        margin: 0 0 4px;
        font-size: 22px;
        text-align: center;
        color: #1e293b;
    }
    .subtitle {
        text-align: center;
        color: #64748b;
        font-size: 13px;
        margin-bottom: 24px;
    }
    label {
        display: block;
        font-size: 13px;
        color: #475569;
        margin: 12px 0 6px;
    }
    input[type=text] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 15px;
    }
    input:focus { outline: 2px solid #0ea5e9; border-color: transparent; }
    button.primary {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background: #0ea5e9;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
    }
    button.primary:hover { background: #0284c7; }
    .error {
        min-height: 18px;
        color: #ef4444;
        font-size: 13px;
        margin-top: 10px;
        text-align: center;
    }
    .hint {
        font-size: 12px;
        color: #94a3b8;
        margin-top: 4px;
    }
</style>
</head>
<body>
<div class="card">
    <h1>🧳 TripPlanner</h1>
    <div class="subtitle">旅行のしおりをみんなで作ろう</div>

    <label>ユーザー名（旅行グループの名前）</label>
    <input type="text" id="room-name" placeholder="例: okinawa-trip">
    <div class="hint">同じ名前を知っている人全員でプランを共有・編集できます。1〜32文字、スペース・「:」「/」「\」は使えません。</div>

    <button class="primary" onclick="enter()">はじめる</button>
    <div class="error" id="auth-error"></div>
</div>

<script>
async function enter() {
    const name = document.getElementById('room-name').value.trim();
    const errEl = document.getElementById('auth-error');
    if (!name) { errEl.textContent = 'ユーザー名を入力してください'; return; }
    errEl.textContent = '確認中…';
    try {
        const res = await fetch('/api/auth/enter', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name})
        });
        const data = await res.json();
        if (!data.ok) { errEl.textContent = data.error || 'エラーが発生しました'; return; }
        errEl.textContent = '';
        localStorage.setItem('tripPlannerLastRoom', name);
        window.location.href = '/trip?room=' + encodeURIComponent(name);
    } catch (e) {
        errEl.textContent = '通信エラーが発生しました';
    }
}

document.getElementById('room-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') enter();
});

// 前回のユーザー名を復元
const lastRoom = localStorage.getItem('tripPlannerLastRoom');
if (lastRoom) document.getElementById('room-name').value = lastRoom;
</script>
</body>
</html>
