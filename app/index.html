<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripPlanner — 旅行プラン共有アプリ</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
        background: linear-gradient(135deg, #0ea5e9, #6366f1);
    }
    .card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        padding: 32px;
        margin: 16px;
    }
    h1 {
        margin: 0 0 4px;
        font-size: 22px;
        text-align: center;
        color: #1e293b;
    }
    .subtitle {
        text-align: center;
        color: #64748b;
        font-size: 13px;
        margin-bottom: 24px;
    }
    .tabs {
        display: flex;
        background: #f1f5f9;
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 20px;
    }
    .tab {
        flex: 1;
        text-align: center;
        padding: 8px 0;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        color: #64748b;
        user-select: none;
    }
    .tab.active {
        background: #fff;
        color: #0ea5e9;
        font-weight: 600;
        box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    label {
        display: block;
        font-size: 13px;
        color: #475569;
        margin: 12px 0 6px;
    }
    input[type=text], input[type=password] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 15px;
    }
    input:focus { outline: 2px solid #0ea5e9; border-color: transparent; }
    button.primary {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background: #0ea5e9;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
    }
    button.primary:hover { background: #0284c7; }
    .error {
        min-height: 18px;
        color: #ef4444;
        font-size: 13px;
        margin-top: 10px;
        text-align: center;
    }
    .pane { display: none; }
    .pane.active { display: block; }
    .reg-result { display: none; text-align: center; }
    .reg-result .pw {
        font-family: monospace;
        font-size: 18px;
        letter-spacing: 1px;
        background: #f1f5f9;
        padding: 12px;
        border-radius: 8px;
        margin: 16px 0;
        color: #0f172a;
    }
    .hint {
        font-size: 12px;
        color: #94a3b8;
        margin-top: 4px;
    }
    button.secondary {
        width: 100%;
        margin-top: 10px;
        padding: 10px;
        background: #f1f5f9;
        color: #334155;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="card">
    <h1>🧳 TripPlanner</h1>
    <div class="subtitle">旅行のしおりをみんなで作ろう</div>

    <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">ログイン</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">新規作成</div>
    </div>

    <div class="pane active" id="pane-login">
        <label>ルームID</label>
        <input type="text" id="login-name" placeholder="例: okinawa-trip">
        <label>パスワード</label>
        <input type="password" id="login-pw" placeholder="発行されたパスワード">
        <button class="primary" onclick="doLogin()">ログインして開く</button>
    </div>

    <div class="pane" id="pane-register">
        <div id="reg-form">
            <label>ルームID（旅行グループの名前）</label>
            <input type="text" id="reg-name" placeholder="例: okinawa-trip">
            <div class="hint">1〜32文字。スペース・「:」「/」「\」は使えません。同じIDとパスワードを知っている人全員でプランを共有・編集できます。</div>
            <button class="primary" onclick="doRegister()">ルームを作成</button>
        </div>
        <div class="reg-result" id="reg-result">
            <p>ルーム「<strong id="reg-result-name"></strong>」を作成しました。</p>
            <p>このパスワードを一緒に旅行する人に共有してください（再表示できません）:</p>
            <div class="pw" id="reg-result-pw"></div>
            <button class="secondary" onclick="copyPassword()">パスワードをコピー</button>
            <button class="primary" onclick="loginAfterRegister()">この内容で開く</button>
        </div>
    </div>

    <div class="error" id="auth-error"></div>
</div>

<script>
function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('pane-login').classList.toggle('active', tab === 'login');
    document.getElementById('pane-register').classList.toggle('active', tab === 'register');
    document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
    const name = document.getElementById('login-name').value.trim();
    const pw   = document.getElementById('login-pw').value.trim();
    const errEl = document.getElementById('auth-error');
    if (!name || !pw) { errEl.textContent = 'ルームIDとパスワードを入力してください'; return; }
    errEl.textContent = '確認中…';
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, password: pw})
        });
        const data = await res.json();
        if (!data.ok) { errEl.textContent = data.error || 'ログインに失敗しました'; return; }
        errEl.textContent = '';
        localStorage.setItem('tripPlannerLastRoom', name);
        window.location.href = '/trip?room=' + encodeURIComponent(name);
    } catch (e) {
        errEl.textContent = '通信エラーが発生しました';
    }
}

async function doRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const errEl = document.getElementById('auth-error');
    if (!name) { errEl.textContent = 'ルームIDを入力してください'; return; }
    errEl.textContent = '作成中…';
    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name})
        });
        const data = await res.json();
        if (!data.ok) { errEl.textContent = data.error || '作成に失敗しました'; return; }
        errEl.textContent = '';
        document.getElementById('reg-form').style.display = 'none';
        document.getElementById('reg-result').style.display = 'block';
        document.getElementById('reg-result-name').textContent = name;
        document.getElementById('reg-result-pw').textContent = data.password;
        document.getElementById('reg-result').dataset.name = name;
        document.getElementById('reg-result').dataset.pw = data.password;
    } catch (e) {
        errEl.textContent = '通信エラーが発生しました';
    }
}

function copyPassword() {
    const pw = document.getElementById('reg-result-pw').textContent;
    navigator.clipboard.writeText(pw).then(() => {
        const errEl = document.getElementById('auth-error');
        errEl.style.color = '#16a34a';
        errEl.textContent = 'コピーしました';
        setTimeout(() => { errEl.textContent = ''; errEl.style.color = '#ef4444'; }, 1500);
    });
}

function loginAfterRegister() {
    const el = document.getElementById('reg-result');
    const name = el.dataset.name;
    localStorage.setItem('tripPlannerLastRoom', name);
    window.location.href = '/trip?room=' + encodeURIComponent(name);
}

// 前回のルームIDを復元
const lastRoom = localStorage.getItem('tripPlannerLastRoom');
if (lastRoom) document.getElementById('login-name').value = lastRoom;
</script>
</body>
</html>
