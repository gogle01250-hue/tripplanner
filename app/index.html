<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripPlanner — 旅行プラン共有アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --tp-bg: #F1F5EA;
        --tp-surface: #FCFEFA;
        --tp-text: #2A331F;
        --tp-text-muted: #71805F;
        --tp-accent: #5C8A4A;
        --tp-accent-dark: #466B38;
        --tp-accent-soft: #DEEACD;
        --tp-secondary: #B98A4E;
        --tp-secondary-soft: #F3E4CC;
        --tp-border: #D7E4C7;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Zen Maru Gothic", "Hiragino Sans", "Yu Gothic", sans-serif;
        background: linear-gradient(160deg, #C9DDB8, #8AB56E 55%, #5C8A4A);
    }
    .card {
        width: 100%;
        max-width: 420px;
        background: var(--tp-surface);
        border-radius: 24px;
        box-shadow: 0 24px 48px rgba(61,47,38,0.22);
        padding: 36px 32px;
        margin: 16px;
        border: 1px solid var(--tp-border);
    }
    h1 {
        margin: 0 0 4px;
        font-size: 24px;
        font-weight: 700;
        text-align: center;
        color: var(--tp-text);
    }
    .subtitle {
        text-align: center;
        color: var(--tp-text-muted);
        font-size: 13px;
        margin-bottom: 28px;
    }
    label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--tp-text);
        margin: 12px 0 6px;
    }
    input[type=text] {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--tp-border);
        border-radius: 14px;
        font-size: 15px;
        font-family: inherit;
        background: #fff;
        color: var(--tp-text);
    }
    input:focus { outline: 2px solid var(--tp-accent); border-color: transparent; }
    button.primary {
        width: 100%;
        margin-top: 22px;
        padding: 13px;
        background: var(--tp-accent);
        color: #fff;
        border: none;
        border-radius: 999px;
        font-size: 15px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(226,114,91,0.35);
    }
    button.primary:hover { background: var(--tp-accent-dark); }
    .error {
        min-height: 18px;
        color: #B3413A;
        font-size: 13px;
        margin-top: 10px;
        text-align: center;
    }
    .hint {
        font-size: 12px;
        color: var(--tp-text-muted);
        margin-top: 6px;
    }
</style>
</head>
<body>
<div class="card">
    <h1>🧳 TripPlanner</h1>
    <div class="subtitle">旅行のしおりをみんなで作ろう</div>

    <label>ユーザー名（旅行グループの名前）</label>
    <input type="text" id="room-name" placeholder="例: okinawa-trip">
    <div class="hint">同じ名前を知っている人全員でプランを共有・編集できます。1〜32文字、スペース・「:」「/」「\」は使えません。</div>

    <button class="primary" onclick="enter()">はじめる</button>
    <div class="error" id="auth-error"></div>
    <div style="text-align:center; font-size:11px; color:var(--tp-text-muted); margin-top:14px;">v1.7</div>
</div>

<script>
async function enter() {
    const name = document.getElementById('room-name').value.trim();
    const errEl = document.getElementById('auth-error');
    if (!name) { errEl.textContent = 'ユーザー名を入力してください'; return; }
    errEl.textContent = '確認中…';
    try {
        const res = await fetch('/api/auth/enter', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name})
        });
        const data = await res.json();
        if (!data.ok) { errEl.textContent = data.error || 'エラーが発生しました'; return; }
        errEl.textContent = '';
        localStorage.setItem('tripPlannerLastRoom', name);
        window.location.href = '/trip?room=' + encodeURIComponent(name);
    } catch (e) {
        errEl.textContent = '通信エラーが発生しました';
    }
}

document.getElementById('room-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') enter();
});

// 前回のユーザー名を復元
const lastRoom = localStorage.getItem('tripPlannerLastRoom');
if (lastRoom) document.getElementById('room-name').value = lastRoom;
</script>
</body>
</html>
